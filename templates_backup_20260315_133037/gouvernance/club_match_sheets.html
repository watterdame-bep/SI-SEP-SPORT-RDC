{% ex
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'rdc-blue': '#0036ca',
                        'rdc-blue-dark': '#002a9e',
                        'rdc-yellow': '#FDE015',
                        'rdc-red': '#ED1C24',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>tends "core/base.html" %}
{% block title %}Feuilles de Match | {{ club.nom_officiel }}{% endblock %}
{% block page_header %}
<div class="bg-gradient-to-r from-rdc-blue via-rdc-blue-dark to-rdc-blue-darker border-b border-rdc-blue-darker/20">
    <div class="px-4 lg:px-8 py-6">
        <div class="flex items-center gap-4">
            <div class="flex h-14 w-14 items-center justify-center bg-white/10 backdrop-blur-sm rounded-xl">
                <i class="fa-solid fa-sheet-plastic text-2xl text-white"></i>
            </div>
            <div>
                <h1 class="text-2xl lg:text-3xl font-bold text-white tracking-tight">Feuilles de Match</h1>
                <p class="text-sm text-white/80 mt-1">Historique des rencontres</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block content %}
<div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg border border-slate-200 p-6">
        <p class="text-slate-600">Feuilles de match à venir...</p>
    </div>
</div>
{% endblock %}
